<div class="auth-page">
  <div class="auth-page__bg" aria-hidden="true"></div>

  <header class="auth-header">
    <div class="auth-header__inner">
      <a routerLink="/" class="auth-logo" aria-label="ArkifiStay home">
        <span class="auth-logo__text">Arkifi<span class="auth-logo__accent">Stay</span></span>
      </a>
      <a routerLink="/login" class="auth-header__link">Sign in</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-panel">
      <p class="auth-eyebrow">Verify email</p>
      <h1 class="auth-title">Enter your 6-digit OTP</h1>
      <p class="auth-lead">
        We sent a verification code to your email address. Enter it below to activate your account.
      </p>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="verify-email">Email</label>
          <input
            id="verify-email"
            class="auth-input"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="you@hotel.com"
          />
          @if (showError('email')) {
            <p class="auth-error">Enter a valid email address.</p>
          }
        </div>

        <div class="auth-field">
          <label class="auth-label" for="verify-otp">OTP code</label>
          <input
            id="verify-otp"
            class="auth-input auth-input--otp"
            type="text"
            maxlength="6"
            formControlName="otp"
            autocomplete="one-time-code"
            placeholder="123456"
          />
          @if (showError('otp')) {
            <p class="auth-error">Enter the 6-digit OTP.</p>
          }
        </div>

        <button type="submit" class="auth-submit" [disabled]="loading">
          {{ loading ? 'Verifying...' : 'Verify email' }}
        </button>
      </form>

      <p class="auth-footer-text">
        Entered wrong email?
        <a routerLink="/register">Register again</a>
      </p>
    </div>
  </main>
</div>
