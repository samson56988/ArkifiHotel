<div class="auth-page">
  <div class="auth-page__bg" aria-hidden="true"></div>

  <header class="auth-header">
    <div class="auth-header__inner">
      <a routerLink="/" class="auth-logo" aria-label="ArkifiStay home">
        <span class="auth-logo__text">Arkifi<span class="auth-logo__accent">Stay</span></span>
      </a>
      <a routerLink="/login" class="auth-header__link">Sign in</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-panel">
      <p class="auth-eyebrow">Forgot password</p>
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-lead">
        Enter the email on your ArkifiStay account. We will send a 6-digit code you can use to choose a new password.
      </p>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="forgot-email">Email</label>
          <input
            id="forgot-email"
            class="auth-input"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="you@hotel.com"
          />
          @if (showError('email')) {
            <p class="auth-error">Enter a valid email address.</p>
          }
        </div>

        <button type="submit" class="auth-submit" [disabled]="loading">
          {{ loading ? 'Sending code...' : 'Send reset code' }}
        </button>
      </form>

      <p class="auth-footer-text">
        Remember your password?
        <a routerLink="/login">Back to sign in</a>
      </p>
    </div>
  </main>
</div>
