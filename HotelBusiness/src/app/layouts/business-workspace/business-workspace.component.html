<div class="dashboard">
  <aside class="sidebar">
    <a class="brand" routerLink="/">
      <span class="brand__mark">A</span>
      <span class="brand__text">ArkifiHub</span>
    </a>

    <nav class="menu">
      <a
        class="menu__item"
        routerLink="/dashboard"
        routerLinkActive="menu__item--active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Overview</a
      >
      <a class="menu__item" routerLink="/rooms" routerLinkActive="menu__item--active">Rooms</a>
      <a class="menu__item" routerLink="/locations" routerLinkActive="menu__item--active">Locations</a>
      <a class="menu__item" routerLink="/amenities" routerLinkActive="menu__item--active">Amenities</a>
      <a class="menu__item" routerLink="/facilities" routerLinkActive="menu__item--active">Facilities</a>
      <a class="menu__item" routerLink="/bookings" routerLinkActive="menu__item--active">Bookings</a>
      <a
        class="menu__item"
        routerLink="/payment-configuration"
        routerLinkActive="menu__item--active"
        >Payment configuration</a
      >
      <a class="menu__item" routerLink="/customers" routerLinkActive="menu__item--active">Customers</a>
      <a class="menu__item" routerLink="/booking-payments" routerLinkActive="menu__item--active"
        >Booking payments</a
      >
      <a class="menu__item" routerLink="/profile" routerLinkActive="menu__item--active">Profile</a>
      <a class="menu__item" routerLink="/social-profile" routerLinkActive="menu__item--active">Social & contact</a>
      <a class="menu__item" routerLink="/storefront-designer" routerLinkActive="menu__item--active"
        >Storefront designer</a
      >
      <a class="menu__item" routerLink="/">Platform home</a>
    </nav>
  </aside>

  <main class="content">
    <ng-content />
  </main>
</div>
