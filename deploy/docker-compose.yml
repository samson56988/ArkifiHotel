# Production stack — config comes from ArkifiHotel/appsettings.json + appsettings.Production.json
# Usage (from repo root on server): ./deploy/deploy.sh

name: arkifistay

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: arkifistay-api
    restart: unless-stopped
    ports:
      - "9001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - api_uploads:/app/wwwroot/uploads

  hotel-business:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.angular
      args:
        APP_DIR: HotelBusiness
        DIST_DIR: HotelBusiness
        API_BASE_URL: http://31.97.116.169:9001
        CUSTOMER_APP_URL: http://31.97.116.169:9003
    container_name: arkifistay-business
    restart: unless-stopped
    ports:
      - "9002:80"
    depends_on:
      - api

  hotel-customer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.angular
      args:
        APP_DIR: HotelCustomer
        DIST_DIR: HotelCustomer
        API_BASE_URL: http://31.97.116.169:9001
        CUSTOMER_APP_URL: http://31.97.116.169:9003
    container_name: arkifistay-customer
    restart: unless-stopped
    ports:
      - "9003:80"
    depends_on:
      - api

  hotel-admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.angular
      args:
        APP_DIR: HotelAdmin
        DIST_DIR: HotelAdmin
        API_BASE_URL: http://31.97.116.169:9001
        CUSTOMER_APP_URL: http://31.97.116.169:9003
    container_name: arkifistay-admin
    restart: unless-stopped
    ports:
      - "9004:80"
    depends_on:
      - api

volumes:
  api_uploads:
