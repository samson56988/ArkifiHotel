<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArkifiHub Login OTP</title>
</head>
<body style="margin:0;padding:0;background:#f2ede4;font-family:Arial,Helvetica,sans-serif;color:#1f2a36;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background:#f2ede4;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width:620px;background:#fffdf9;border:1px solid #d9cfbf;border-radius:14px;overflow:hidden;">
          <tr>
            <td style="padding:22px 26px;background:linear-gradient(120deg,#131c28,#30465c);color:#f6e6ce;">
              <span style="display:inline-block;width:34px;height:34px;line-height:34px;text-align:center;background:#b6916a;color:#162230;border-radius:8px;font-weight:700;font-size:20px;">A</span>
              <span style="margin-left:10px;font-size:20px;font-weight:700;vertical-align:middle;">ArkifiHub</span>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 26px 18px 26px;">
              <p style="margin:0 0 8px 0;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;color:#5a6d5f;font-weight:700;">Two-factor login</p>
              <h1 style="margin:0 0 14px 0;font-size:26px;line-height:1.2;color:#1c2530;">Hi {{BusinessName}}, confirm this login</h1>
              <p style="margin:0 0 16px 0;font-size:16px;line-height:1.6;color:#3f4a58;">
                Use this one-time code to complete your ArkifiHub sign-in.
              </p>
              <div style="margin:0 0 16px 0;padding:14px 16px;border-radius:10px;background:#f7f2ea;border:1px solid #e0d6c8;text-align:center;">
                <span style="display:inline-block;font-size:30px;letter-spacing:8px;font-weight:700;color:#1f2a36;">{{OtpCode}}</span>
              </div>
              <p style="margin:0 0 10px 0;font-size:14px;line-height:1.5;color:#5a6472;">
                This code expires in {{ExpiresMinutes}} minutes.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 26px 24px 26px;border-top:1px solid #ece3d7;background:#fffaf4;">
              <p style="margin:0 0 6px 0;font-size:13px;color:#6f7a88;">
                Need help? Contact us at <a href="mailto:{{SupportEmail}}" style="color:#3b4f66;">{{SupportEmail}}</a>.
              </p>
              <p style="margin:0;font-size:12px;color:#8f98a3;">&copy; {{Year}} ArkifiHub. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
