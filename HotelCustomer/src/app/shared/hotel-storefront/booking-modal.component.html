@if (ui.bookingOpen()) {
  <div class="modal-overlay open" (click)="onOverlayClick($event)" role="dialog" aria-modal="true">
    <div class="modal">
      <button type="button" class="modal-close" (click)="close()" aria-label="Close">✕</button>
      <div class="modal-title">{{ selectedRoomName() }}</div>
      <div class="modal-subtitle">
        @if (selectedRoomPrice(); as price) {
          {{ price }}
        } @else {
          Select a room to see pricing
        }
      </div>

      <form class="modal-form" (submit)="submit($event)">
        <div class="form-group">
          <label class="form-label">Select room</label>
          <select
            class="form-input"
            [ngModel]="selectedRoomId"
            (ngModelChange)="onRoomChange($event)"
            name="room"
          >
            <option value="">Choose a room…</option>
            @for (room of availableRooms(); track room.id) {
              <option [value]="room.id">{{ room.name }} — {{ formatPrice(room.basePricePerNight) }}/night</option>
            }
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Check-in</label>
            <input
              class="form-input"
              type="date"
              [min]="todayIso()"
              [(ngModel)]="checkIn"
              name="checkIn"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Check-out</label>
            <input
              class="form-input"
              type="date"
              [min]="todayIso()"
              [(ngModel)]="checkOut"
              name="checkOut"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input
              class="form-input"
              type="text"
              placeholder="John Doe"
              name="name"
              [(ngModel)]="guestName"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Phone number</label>
            <input
              class="form-input"
              type="tel"
              placeholder="+2348034567890"
              name="phone"
              [(ngModel)]="guestPhone"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email address</label>
          <input
            class="form-input"
            type="email"
            placeholder="john@email.com"
            name="email"
            [(ngModel)]="guestEmail"
            required
          />
        </div>

        @if (formError()) {
          <p class="modal-error" role="alert">{{ formError() }}</p>
        }

        <div class="modal-total">
          <span class="modal-total-label">Estimated total</span>
          <span class="modal-total-price">{{ estimatedTotal() }}</span>
        </div>

        <button type="submit" class="btn-submit" [disabled]="submitting()">
          @if (submitting()) {
            Redirecting to payment…
          } @else {
            Pay &amp; confirm booking →
          }
        </button>
      </form>
    </div>
  </div>
}

@if (ui.toastMessage(); as msg) {
  <div class="toast show" role="status">✓ {{ msg }}</div>
}
