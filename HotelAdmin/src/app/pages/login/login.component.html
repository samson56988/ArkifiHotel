<div class="auth-page">
  <div class="auth-page__bg" aria-hidden="true"></div>

  <header class="auth-header">
    <div class="auth-header__inner">
      <span class="auth-logo">
        <span class="auth-logo__text">Arkifi<span class="auth-logo__accent">Stay</span></span>
      </span>
      <span class="auth-header__tag">Platform admin</span>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-panel">
      <p class="auth-eyebrow">Internal access</p>
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-lead">Manage businesses, subscriptions, and platform activity.</p>

      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="email">Work email</label>
          <input id="email" class="auth-input" type="email" formControlName="email" autocomplete="username" />
          @if (showError('email')) {
            <p class="auth-error">Enter a valid email.</p>
          }
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input id="password" class="auth-input" type="password" formControlName="password" autocomplete="current-password" />
          @if (showError('password')) {
            <p class="auth-error">At least 8 characters.</p>
          }
        </div>

        <label class="auth-check">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Remember me</span>
        </label>

        <button type="submit" class="auth-submit" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </main>
</div>
